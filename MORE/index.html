<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mad Max | Mapnum Opus</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="css/style.css">
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

        <script src="https://cdn.tailwindcss.com"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    </head>

    <body class="flex bg-black text-gray-200 font-sans overflow-hidden">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar w-1/3 flex flex-col border-r border-gray-900" id="sidebar">
            <!-- Top of Left Sidebar -->
            <div class="p-6 border-b border-gray-800 bg-zinc-900/50">
                <h1 class="text-xl font-black text-orange-500 tracking-tighter uppercase italic">
                    Max's Optimal Route Engine
                </h1>
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em] mt-1">
                    Mad Max Route Engine v0.4
                </p>
            </div>

            <!-- Route list with cards -->
            <div id="route-list" class="flex-grow overflow-y-auto">
                <!-- Automatically filled in with code -->
            </div>

            <!-- Sits below route list and contains the collapsable stats -->
            <div id="route-stats" class="bg-zinc-900 border-t-2 border-orange-500/20 shadow-[0_-15px_40px_rgba(0,0,0,0.8)]">
                <div onclick="toggleStats()" class="flex justify-between items-center p-4 cursor-pointer hover:bg-white/5 transition-colors">
                    <div class="flex items-center gap-3">
                        <span id="stats-chevron" class="text-orange-500 transition-transform duration-300">
                            ▼
                        </span>
                        <span class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em]">
                            Route Progress
                        </span>
                    </div>
                    <span id="total-progress-percent" class="text-[10px] font-mono font-black text-orange-500/50">
                        0% COMPLETE
                    </span>
                </div>
                
                <div id="stats-content" class="max-h-[500px] overflow-hidden transition-all duration-500 ease-in-out px-6 pb-6">
                    <div id="stats-container" class="grid grid-cols-3 gap-x-4 gap-y-6">
                        <!-- Automatically filled in with code -->
                    </div>
                </div>
            </div>

            <!-- Bottom watermark -->
            <div class="p-3 bg-black border-t border-gray-800 text-center">
                <p class="text-[9px] text-gray-600 uppercase tracking-widest font-bold">
                    Made by Plyd
                </p>
            </div>
        </div>

        <!-- BUTTONS OVER THE MAP -->
        <div class="w-2/3 relative h-screen">
            <div id="map">
                <!-- Automatically filled in with code -->
            </div>

            <!-- Bottom right pixel coords display (CURRENT OVERWRITTEN BY NODE LOGGING #TODO: CHANGE BACK) -->
            <!--<div id="coord-helper" class="absolute bottom-6 right-6 bg-black/90 p-3 text-[11px] text-orange-400 font-mono z-[1000] border border-orange-500/20 rounded-md shadow-2xl">
                Click map for pixel coordinates
            </div>-->
            
            <!-- Settings Menu -->
            <div class = "absolute top-4 right-4 z-[1001] flex gap-2">
                <button onclick="toggleSettings()" class="bg-black/80 border border-white/30 p-2 hover:bg-stone-900 transition-colors">
                    <span class="text-[12px] font-black text-white uppercase tracking-widest px-2">Settings</span>
                </button>
            </div>

            <div id="settings-menu" class="hidden absolute top-16 right-4 z-[1000] w-64 bg-black/95 backdrop-blur-md border border-white/30 max-h-[80vh] overflow-y-auto">
                <div class="p-4 flex flex-col gap-6">
                    <section>
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] mb-3 border-b border-orange-500/10 pb-1 text-center">
                            Display
                        </h3>
                        <div class="flex flex-col gap-2">
                            <!-- Toggle Road Lines -->
                            <button onclick="toggleLines()" class="font-black flex items-center text-[11px] text-gray-400 hover:text-white group">
                                <div id="line-toggle-led" class="w-2 h-2 rounded-full bg-green-500"></div>
                                <span>
                                    Show Road Overlay
                                </span>
                                
                            </button>

                            <!-- Toggle Icons -->
                            <button onclick="toggleIcons()" class="font-black flex items-center text-[11px] text-gray-400 hover:text-white group">
                                <div id="icon-toggle-led" class="w-2 h-2 rounded-full bg-green-500"></div>
                                <span>
                                    Show Icons
                                </span>
                                
                            </button>
                        </div>
                    </section>
                    </div>

                    <section class="mt-4 border-t border-zinc-800 pt-2">
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] mb-3 border-b border-orange-500/10 pb-1 text-center">Route Management</h3>
                        <div class="flex flex-col gap-2">
                            <label class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-zinc-800 rounded-sm cursor-pointer hover:bg-zinc-900 hover:border-blue-500/30 transition-all group">
                                <div class="flex flex-col items-center justify-center pt-2">
                                    <span class="text-[12px] font-black text-white text-zinc-500 group-hover:text-zinc-300">
                                        Select .yaml file here
                                    </span>
                                </div>
                                <input id="route-upload" type="file" class="hidden" accept=".yaml" onchange="importRoute(event)" />
                            </label>
                        </div>
                    </section>

                    <section class="mt-4 border-t border-white">
                        <div class="flex flex-col gap-2 border-white">
                            <button onclick="exportToLSS()" class="icon-toggle-btn">
                                <h3 class = "bg-black/80 border border-white/50 text-white px-3 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-zinc-400 hover:text-zinc-300 transition-all shadow-2xl rounded">
                                    Export As .lss File
                                </h3>
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- Make sure to have data before code or else code breaks -->
        <script src="road_network.js"></script>
        <script src="map_locations.js"></script>
        <script src="route_manager.js"></script>

        <script src="lss_converter.js"></script>
        <script src="map_generator.js"></script>
        <script src="constants.js"></script>
        <script src="pathfinding.js"></script>
        <script src="ui_manager.js"></script>
        <script src="map_engine.js"></script>
        <script src="node_logging.js"></script>

        <script>
            // Initialize region filter
            initRegionHUD();

            // render route once all data is loaded
            renderRoute();
        </script>
    </body>
</html>
